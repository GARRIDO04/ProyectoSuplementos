<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Maestro - Suplementos Perrones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .oculto { display: none !important; }
        
        /* Estilos Dashboard: Fondo negro, borde blanco */
        .card-custom { 
            background-color: #000 !important; 
            border: 2px solid #fff !important; 
            transition: transform 0.3s ease; 
        }
        .card-custom:hover { transform: translateY(-5px); }
        
        /* Magia del rol */
        body.modo-visitante .admin-only { display: none !important; }

        /* Estilos de impresión */
        @media print {
            body * { visibility: hidden; }
            #zonaTicket, #zonaTicket * { visibility: visible; }
            #zonaTicket { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; }
        }
    </style>
</head>
<body class="bg-dark text-light" onload="verificarSesion()">

    <div id="zonaTicket" class="d-none text-dark bg-white"></div>

    <!-- --- LOGIN --- -->
    <div id="loginScreen" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h1 class="display-5 fw-bold text-warning">SUPLEMENTOS PERRONES</h1>
                </div>
                <div class="card bg-secondary text-light shadow-lg">
                    <div class="card-body p-4">
                        <form id="formLogin" onsubmit="iniciarSesion(event)">
                            <div class="mb-3"><label class="form-label">Usuario</label><input type="text" id="loginUsr" class="form-control" required></div>
                            <div class="mb-4"><label class="form-label">Contraseña</label><input type="password" id="loginPass" class="form-control" required></div>
                            <button type="submit" class="btn btn-warning w-100 fw-bold">Ingresar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- --- APP --- -->
    <div id="appPrincipal" class="oculto">
        <nav class="navbar navbar-expand-lg navbar-dark bg-secondary mb-4 shadow">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="#" onclick="cambiarSeccion('inicio')">SISTEMA SUPLEMENTOS PERRONES</a>
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="cambiarSeccion('productos')">Productos</a></li>
                    <li class="nav-item admin-only"><a class="nav-link" href="#" onclick="cambiarSeccion('proveedores')">Proveedores</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="cambiarSeccion('clientes')">Clientes</a></li>
                    <li class="nav-item admin-only"><a class="nav-link" href="#" onclick="cambiarSeccion('compras')">Compras</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="cambiarSeccion('ventas')">Ventas</a></li>
                    <li class="nav-item"><button class="btn btn-outline-danger btn-sm ms-3" onclick="cerrarSesion()">Salir</button></li>
                </ul>
            </div>
        </nav>

        <div class="container">
            <div id="inicio" class="mt-4">
                <div class="text-center mb-5">
                    <h1 class="display-4 fw-bold text-uppercase text-warning">Panel de Control</h1>
                    <p id="mensajeRol" class="fs-4 mt-3"></p>
                </div>
                <div class="row text-center g-4">
                    <div class="col-md-4"><div class="card card-custom p-4 text-white"><h4 class="fw-bold">Ingresos</h4><h1 id="dashIngresos" class="fw-bold">$0.00</h1></div></div>
                    <div class="col-md-4"><div class="card card-custom p-4 text-white"><h4 class="fw-bold">Stock Total</h4><h1 id="dashStock" class="fw-bold">0</h1></div></div>
                    <div class="col-md-4"><div class="card card-custom p-4 text-white"><h4 class="fw-bold">Clientes</h4><h1 id="dashClientes" class="fw-bold">0</h1></div></div>
                </div>
            </div>

            <!-- MÓDULO PRODUCTOS -->
            <div id="productos" class="oculto">
                <h2 class="text-warning">Inventario</h2>
                <div class="card bg-secondary p-3 mb-4 admin-only">
                    <form id="formProducto" onsubmit="guardarProducto(event)">
                        <div class="row g-2">
                            <div class="col"><input type="text" id="prodNombre" class="form-control" placeholder="Nombre" required></div>
                            <div class="col"><input type="text" id="prodCategoria" class="form-control" placeholder="Cat" required></div>
                            <div class="col"><input type="number" step="0.01" id="prodPrecio" class="form-control" placeholder="Precio $" required></div>
                            <div class="col"><input type="number" id="prodStock" class="form-control" placeholder="Stock" required></div>
                            <div class="col"><button type="submit" class="btn btn-warning w-100">Guardar</button></div>
                        </div>
                    </form>
                </div>
                <table class="table table-dark table-striped"><tbody id="tablaProductos"></tbody></table>
            </div>

            <!-- MÓDULOS COMPRAS/VENTAS (Con cálculo automático) -->
            <div id="compras" class="oculto admin-only">
                <h2 class="text-info">Compras</h2>
                <div class="card bg-secondary p-3 mb-4">
                    <form id="formCompra" onsubmit="guardarCompra(event)">
                        <div class="row g-2">
                            <div class="col-md-3"><select id="compProd" class="form-select" onchange="calcularTotal('compProd', 'compCant', 'compTotal')" required></select></div>
                            <div class="col-md-3"><select id="compProv" class="form-select" required></select></div>
                            <div class="col-md-2"><input type="number" id="compCant" class="form-control" placeholder="Cant" oninput="calcularTotal('compProd', 'compCant', 'compTotal')" required></div>
                            <div class="col-md-2"><input type="number" step="0.01" id="compTotal" class="form-control" placeholder="Total $" required></div>
                            <div class="col-md-2"><button type="submit" class="btn btn-info w-100">Registrar</button></div>
                        </div>
                    </form>
                </div>
                <table class="table table-dark table-striped"><tbody id="tablaCompras"></tbody></table>
            </div>

            <div id="ventas" class="oculto">
                <h2 class="text-success">Ventas</h2>
                <div class="card bg-secondary p-3 mb-4">
                    <form id="formVenta" onsubmit="guardarVenta(event)">
                        <div class="row g-2">
                            <div class="col-md-3"><select id="venProd" class="form-select" onchange="calcularTotal('venProd', 'venCant', 'venTotal')" required></select></div>
                            <div class="col-md-3"><select id="venCli" class="form-select" required></select></div>
                            <div class="col-md-2"><input type="number" id="venCant" class="form-control" placeholder="Cant" oninput="calcularTotal('venProd', 'venCant', 'venTotal')" required></div>
                            <div class="col-md-2"><input type="number" step="0.01" id="venTotal" class="form-control" placeholder="Total $" required></div>
                            <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Registrar</button></div>
                        </div>
                    </form>
                </div>
                <table class="table table-dark table-striped"><tbody id="tablaVentas"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE CÁLCULO ---
        function calcularTotal(selectId, cantId, totalId) {
            const nombre = document.getElementById(selectId).value;
            const cant = document.getElementById(cantId).value;
            const productos = JSON.parse(localStorage.getItem('bd_productos')) || [];
            const prod = productos.find(p => p.nombre === nombre);
            
            if (prod && cant) {
                document.getElementById(totalId).value = (prod.precio * cant).toFixed(2);
            }
        }

        // --- SISTEMA DE LOGIN Y SESIONES ---
        const credenciales = {
            'admin': { pass: '123', rol: 'admin', saludo: 'Modo Administrador' },
            'visitante': { pass: '123', rol: 'visitante', saludo: 'Modo Vendedor' }
        };

        function iniciarSesion(e) {
            e.preventDefault();
            let usr = document.getElementById('loginUsr').value.toLowerCase();
            let pass = document.getElementById('loginPass').value;
            if (credenciales[usr] && credenciales[usr].pass === pass) {
                localStorage.setItem('sesion_suplementos', usr);
                verificarSesion();
            } else { alert('Usuario o contraseña incorrectos.'); }
        }

        function verificarSesion() {
            let usuarioActual = localStorage.getItem('sesion_suplementos');
            if (!usuarioActual || !credenciales[usuarioActual]) {
                document.getElementById('loginScreen').classList.remove('oculto');
                document.getElementById('appPrincipal').classList.add('oculto');
                return;
            }
            document.getElementById('loginScreen').classList.add('oculto');
            document.getElementById('appPrincipal').classList.remove('oculto');
            if (credenciales[usuarioActual].rol === 'visitante') document.body.classList.add('modo-visitante');
            document.getElementById('mensajeRol').innerText = credenciales[usuarioActual].saludo;
            cargarTodasLasTablas();
            cambiarSeccion('inicio');
        }

        function cerrarSesion() { localStorage.removeItem('sesion_suplementos'); location.reload(); }

        // --- REFRESCAR UI Y TABLAS ---
        function cambiarSeccion(seccionActiva) {
            ['inicio', 'productos', 'proveedores', 'clientes', 'compras', 'ventas'].forEach(sec => {
                document.getElementById(sec).classList.toggle('oculto', sec !== seccionActiva);
            });
            refrescarUI();
        }

        function refrescarUI() {
            let productos = JSON.parse(localStorage.getItem('bd_productos')) || [];
            let ventas = JSON.parse(localStorage.getItem('bd_ventas')) || [];
            
            document.getElementById('dashIngresos').innerText = '$' + ventas.reduce((acc, v) => acc + parseFloat(v.total), 0).toFixed(2);
            document.getElementById('dashStock').innerText = productos.reduce((acc, p) => acc + parseInt(p.stock), 0);
            document.getElementById('dashClientes').innerText = (JSON.parse(localStorage.getItem('bd_clientes')) || []).length;

            // Actualizar selects
            let prodHTML = '<option value="">Selecciona...</option>';
            productos.forEach(p => prodHTML += `<option value="${p.nombre}">${p.nombre} ($${p.precio})</option>`);
            document.getElementById('compProd').innerHTML = prodHTML;
            document.getElementById('venProd').innerHTML = prodHTML;
            
            let provHTML = '<option value="">Selecciona...</option>';
            (JSON.parse(localStorage.getItem('bd_proveedores')) || []).forEach(p => provHTML += `<option value="${p.nombre}">${p.nombre}</option>`);
            document.getElementById('compProv').innerHTML = provHTML;

            let cliHTML = '<option value="">Selecciona...</option>';
            (JSON.parse(localStorage.getItem('bd_clientes')) || []).forEach(c => cliHTML += `<option value="${c.nombre}">${c.nombre}</option>`);
            document.getElementById('venCli').innerHTML = cliHTML;
        }

        // --- TICKETS ---
        function imprimirTicket(tipo, index) {
            let trans = JSON.parse(localStorage.getItem(tipo === 'Venta' ? 'bd_ventas' : 'bd_compras'))[index];
            let html = `<div style="padding:20px; font-family:monospace; border:1px solid #000; width:300px;">
                <h3>SUPLEMENTOS PERRONES</h3>
                <p>Fecha: ${new Date().toLocaleDateString()}</p>
                <p>Producto: ${trans.producto}</p>
                <p>Cantidad: ${trans.cantidad}</p>
                <hr>
                <h4>TOTAL: $${trans.total}</h4>
            </div>`;
            document.getElementById('zonaTicket').innerHTML = html;
            window.print();
        }

        // --- Funciones auxiliares de carga y guardado ---
        function cargarTodasLasTablas() {
            cargarDatos('tablaProductos', 'bd_productos', (p,i) => `<tr><td>${p.nombre}</td><td>$${p.precio}</td><td>${p.stock}</td><td class="text-center admin-only"><button class="btn btn-sm btn-danger" onclick="eliminarDato(${i}, 'bd_productos', 'tablaProductos', generarFilaProducto)">Borrar</button></td></tr>`);
            cargarDatos('tablaCompras', 'bd_compras', (c,i) => `<tr><td>${c.producto}</td><td>$${c.total}</td><td class="text-center"><button class="btn btn-sm btn-light" onclick="imprimirTicket('Compra', ${i})">Ticket</button></td></tr>`);
            cargarDatos('tablaVentas', 'bd_ventas', (v,i) => `<tr><td>${v.producto}</td><td>$${v.total}</td><td class="text-center"><button class="btn btn-sm btn-light" onclick="imprimirTicket('Venta', ${i})">Ticket</button><button class="btn btn-sm btn-danger admin-only" onclick="eliminarDato(${i}, 'bd_ventas', 'tablaVentas', generarFilaVenta)">Borrar</button></td></tr>`);
        }

        function cargarDatos(id, bd, gen) {
            let tabla = document.getElementById(id); tabla.innerHTML = '';
            (JSON.parse(localStorage.getItem(bd)) || []).forEach((item, i) => tabla.innerHTML += gen(item, i));
        }

        function eliminarDato(i, bd, id, gen) {
            let d = JSON.parse(localStorage.getItem(bd)); d.splice(i, 1);
            localStorage.setItem(bd, JSON.stringify(d)); cargarTodasLasTablas();
        }
        
        // Mantener las funciones de guardarProducto, guardarCompra, etc., tal cual las tenías.
        function guardarProducto(e) { e.preventDefault(); /* ... lógica de guardado ... */ refrescarUI(); }
        function guardarCompra(e) { e.preventDefault(); /* ... lógica de guardado ... */ refrescarUI(); }
        function guardarVenta(e) { e.preventDefault(); /* ... lógica de guardado ... */ refrescarUI(); }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
