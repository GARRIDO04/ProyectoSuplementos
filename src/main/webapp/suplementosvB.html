<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plan B - Suplementos Perrones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light" onload="cargarProductos()">

    <div class="container mt-5">
        <h1 class="text-center text-warning fw-bold mb-4">🦇Módulo Portátil: Inventario</h1>
        
        <div class="card bg-secondary text-light shadow mb-4">
            <div class="card-body">
                <form id="formProducto" onsubmit="guardarProducto(event)">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <input type="text" id="nombreP" class="form-control" placeholder="Nombre del Suplemento" required>
                        </div>
                        <div class="col-md-4">
                            <input type="text" id="marcaP" class="form-control" placeholder="Marca" required>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-warning w-100 fw-bold">Guardar Producto</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Marca</th>
                        <th class="text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Función para atrapar el formulario y guardarlo
        function guardarProducto(event) {
            event.preventDefault(); // Evita que la página se recargue

            let nombre = document.getElementById('nombreP').value;
            let marca = document.getElementById('marcaP').value;

            // Creamos un objeto con los datos
            let nuevoProducto = { nombre: nombre, marca: marca };

            // Revisamos si ya hay productos en la memoria, si no, creamos un arreglo vacío
            let inventario = JSON.parse(localStorage.getItem('inventarioBat')) || [];
            
            // Agregamos el nuevo producto al arreglo
            inventario.push(nuevoProducto);

            // Guardamos el arreglo actualizado en la memoria del navegador
            localStorage.setItem('inventarioBat', JSON.stringify(inventario));

            // Limpiamos el formulario y recargamos la tabla
            document.getElementById('formProducto').reset();
            cargarProductos();
        }

        // Función para leer la memoria y pintar la tabla
        function cargarProductos() {
            let inventario = JSON.parse(localStorage.getItem('inventarioBat')) || [];
            let tabla = document.getElementById('tablaProductos');
            tabla.innerHTML = ''; // Limpiamos la tabla antes de llenarla

            inventario.forEach((producto, index) => {
                tabla.innerHTML += `
                    <tr>
                        <td>${producto.nombre}</td>
                        <td>${producto.marca}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-danger" onclick="eliminarProducto(${index})">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Función para borrar un producto de la memoria
        function eliminarProducto(index) {
            let inventario = JSON.parse(localStorage.getItem('inventarioBat'));
            inventario.splice(index, 1); // Borra el elemento seleccionado
            localStorage.setItem('inventarioBat', JSON.stringify(inventario)); // Actualiza la memoria
            cargarProductos(); // Recarga la tabla
        }
    </script>
</body>
</html>
